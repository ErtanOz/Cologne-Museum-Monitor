[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Content-Type = "application/json"

# More specific routes first
[[redirects]]
  from = "/api/health"
  to = "/api/health.json"
  status = 200

[[redirects]]
  from = "/api/museums/history"
  to = "/api/history.json"
  status = 200

[[redirects]]
  from = "/api/museums/refresh"
  to = "/.netlify/functions/refresh"
  status = 200

[[redirects]]
  from = "/api/museums"
  to = "/api/museums.json"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
